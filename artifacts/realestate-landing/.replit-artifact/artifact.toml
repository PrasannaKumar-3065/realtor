kind = "web"
previewPath = "/"
title = "Real Estate Agency Landing Page"
version = "1.0.0"
id = "artifacts/realestate-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21606

[services.development]
run = "pnpm --filter @workspace/realestate-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/realestate-landing", "run", "build" ]
publicDir = "artifacts/realestate-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21606"
BASE_PATH = "/"
